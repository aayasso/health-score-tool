
[functions.generate-interpretation]
enabled = true
verify_jwt = true
import_map = "./functions/generate-interpretation/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/generate-interpretation/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/generate-interpretation/*.html" ]

[functions.badge]
enabled = true
verify_jwt = false
entrypoint = "./functions/badge/index.ts"
